services:
  postgres:
    image: postgres:17-alpine
    container_name: venueops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: venueops_erp
      POSTGRES_USER: venueops
      POSTGRES_PASSWORD: venueops_dev_password
    ports:
      - "5432:5432"
    volumes:
      - venueops_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: venueops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - venueops_redis_data:/data

volumes:
  venueops_postgres_data:
  venueops_redis_data:
